name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore Observability.sln
      - name: Build
        run: dotnet build Observability.sln --configuration Release --no-restore
      - name: Unit tests
        run: dotnet test tests/Observability.UnitTests/Observability.UnitTests.csproj --configuration Release --no-build --verbosity normal
      - name: Integration tests
        run: dotnet test tests/Observability.IntegrationTests/Observability.IntegrationTests.csproj --configuration Release --no-build --verbosity normal
