services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: adaptive-obs-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev_Password_1!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dev_Password_1!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adaptive-obs-backend
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ObservabilityDb: "Server=mssql,1433;Database=ObservabilityDev;User Id=sa;Password=Dev_Password_1!;TrustServerCertificate=true"
      Observability__ApiKeyHashPepper: "dev-pepper-not-for-prod"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adaptive-obs-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: "http://localhost:8080"
    ports:
      - "5173:5173"

volumes:
  mssql-data:
